<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Dibujo de Angela</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --panel-color: #1a1a1a;
            --accent-color: #ff79c6;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column;
            color: white;
        }

        /* Barra de Herramientas Principal */
        #toolbar {
            height: auto;
            min-height: 80px;
            background: var(--panel-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            padding: 10px 20px;
            gap: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            z-index: 10;
            border-bottom: 2px solid #333;
        }

        .brand h1 {
            color: var(--accent-color);
            font-size: 1.1rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Contenedor de colores */
        .color-section {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #252525;
            padding: 8px 15px;
            border-radius: 40px;
        }

        .swatches-grid {
            display: flex;
            gap: 8px;
        }

        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .color-swatch.active {
            border-color: white;
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* Selector de Oscuridad */
        .intensity-section {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #252525;
            padding: 8px 15px;
            border-radius: 40px;
        }

        input[type=range] {
            cursor: pointer;
            width: 120px;
            accent-color: var(--accent-color);
        }

        label { font-size: 0.8rem; opacity: 0.8; }

        #clear-btn {
            margin-left: auto;
            padding: 10px 20px;
            background: #ff5555;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Lienzo */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
        }

        canvas { display: block; }

        .guide {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }
        #guide-h { width: 100%; height: 1px; top: 50%; left: 0; }
        #guide-v { width: 1px; height: 100%; left: 50%; top: 0; }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="brand">
        <h1>El Dibujo de Angela</h1>
    </div>

    <div class="color-section">
        <div class="swatches-grid" id="palette">
            <!-- Colores base (Hue) -->
            <div class="color-swatch active" style="background: hsl(330, 100%, 50%);" data-h="330"></div>
            <div class="color-swatch" style="background: hsl(0, 100%, 50%);" data-h="0"></div>
            <div class="color-swatch" style="background: hsl(30, 100%, 50%);" data-h="30"></div>
            <div class="color-swatch" style="background: hsl(60, 100%, 50%);" data-h="60"></div>
            <div class="color-swatch" style="background: hsl(120, 100%, 50%);" data-h="120"></div>
            <div class="color-swatch" style="background: hsl(180, 100%, 50%);" data-h="180"></div>
            <div class="color-swatch" style="background: hsl(220, 100%, 50%);" data-h="220"></div>
            <div class="color-swatch" style="background: hsl(280, 100%, 50%);" data-h="280"></div>
            <div class="color-swatch" style="background: hsl(0, 0%, 100%);" data-h="0" data-s="0"></div>
        </div>
    </div>

    <div class="intensity-section">
        <label>Luz / Sombra</label>
        <input type="range" id="lightness" min="10" max="90" value="50">
    </div>

    <button id="clear-btn">Limpiar</button>
</div>

<div id="canvas-container">
    <div id="guide-h" class="guide"></div>
    <div id="guide-v" class="guide"></div>
    <canvas id="paintCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    const palette = document.getElementById('palette');
    const lightSlider = document.getElementById('lightness');
    const clearBtn = document.getElementById('clear-btn');

    let drawing = false;
    let currentHue = 330;
    let currentSat = 100;
    let currentLight = 50;
    let points = []; 

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - document.getElementById('toolbar').offsetHeight;
        clearCanvas();
    }

    function clearCanvas() {
        ctx.fillStyle = '#0f0f0f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    window.addEventListener('resize', resize);
    setTimeout(resize, 100);

    // Selección de color base
    palette.addEventListener('click', (e) => {
        if (e.target.classList.contains('color-swatch')) {
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            e.target.classList.add('active');
            
            currentHue = e.target.dataset.h;
            // Si es blanco/gris (sat 0)
            currentSat = e.target.dataset.s !== undefined ? e.target.dataset.s : 100;
        }
    });

    // Control de oscuridad
    lightSlider.addEventListener('input', (e) => {
        currentLight = e.target.value;
    });

    function getFullColor() {
        return `hsl(${currentHue}, ${currentSat}%, ${currentLight}%)`;
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDrawing(e) {
        drawing = true;
        points = [];
        points.push(getPos(e));
    }

    function draw(e) {
        if (!drawing) return;
        const pos = getPos(e);
        points.push(pos);

        if (points.length < 3) return;

        ctx.lineWidth = 4;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.strokeStyle = getFullColor();

        const i = points.length - 2;
        const xc = (points[i].x + points[i + 1].x) / 2;
        const yc = (points[i].y + points[i + 1].y) / 2;

        const w = canvas.width;
        const h = canvas.height;

        // Cuadrantes Simétricos
        drawSymmetry(points[i-1].x, points[i-1].y, points[i].x, points[i].y, xc, yc, w, h);
    }

    function drawSymmetry(x0, y0, x1, y1, xc, yc, w, h) {
        // 1. Original
        render(x0, y0, x1, y1, xc, yc);
        // 2. Espejo H
        render(w - x0, y0, w - x1, y1, w - xc, yc);
        // 3. Espejo V
        render(x0, h - y0, x1, h - y1, xc, h - yc);
        // 4. Espejo Total
        render(w - x0, h - y0, w - x1, h - y1, w - xc, h - yc);
    }

    function render(ax, ay, bx, by, cx, cy) {
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.quadraticCurveTo(bx, by, cx, cy);
        ctx.stroke();
    }

    function stopDrawing() { drawing = false; }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
    canvas.addEventListener('touchend', stopDrawing);
    clearBtn.addEventListener('click', clearCanvas);

</script>
</body>
</html>
