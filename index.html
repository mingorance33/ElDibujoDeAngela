<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Dibujo de Angela</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #161616;
            --accent-color: #ff79c6;
            --tool-inactive: #444;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            color: white;
        }

        #toolbar {
            background: var(--panel-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            padding: 12px 20px;
            gap: 20px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.9);
            z-index: 10;
        }

        .brand h1 {
            color: var(--accent-color);
            font-size: 1rem;
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Sección de Herramientas */
        .tools-group {
            display: flex;
            background: #222;
            padding: 5px;
            border-radius: 12px;
            gap: 5px;
        }

        .tool-btn {
            padding: 8px 15px;
            border: none;
            background: transparent;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .tool-btn.active {
            background: var(--accent-color);
            font-weight: bold;
        }

        .color-section {
            display: flex;
            gap: 10px;
            background: #222;
            padding: 8px 15px;
            border-radius: 50px;
        }

        .color-swatch {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .color-swatch.active {
            border-color: white;
            transform: scale(1.2);
        }

        .intensity-section {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #222;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
        }

        input[type=range] { width: 100px; accent-color: var(--accent-color); }

        #clear-btn {
            margin-left: auto;
            padding: 8px 20px;
            background: #ff5555;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        #canvas-container { flex-grow: 1; position: relative; background: #000; }
        canvas { display: block; }
        .guide {
            position: absolute; background: rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }
        #guide-h { width: 100%; height: 1px; top: 50%; left: 0; }
        #guide-v { width: 1px; height: 100%; left: 50%; top: 0; }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="brand"><h1>Angela Studio</h1></div>

    <div class="tools-group">
        <button class="tool-btn active" id="btn-draw">✏️ Dibujar</button>
        <button class="tool-btn" id="btn-fill">🪣 Rellenar</button>
    </div>

    <div class="color-section" id="palette">
        <div class="color-swatch active" data-h="330"></div>
        <div class="color-swatch" data-h="0"></div>
        <div class="color-swatch" data-h="30"></div>
        <div class="color-swatch" data-h="60"></div>
        <div class="color-swatch" data-h="120"></div>
        <div class="color-swatch" data-h="180"></div>
        <div class="color-swatch" data-h="220"></div>
        <div class="color-swatch" data-h="280"></div>
        <div class="color-swatch" data-h="0" data-s="0"></div>
    </div>

    <div class="intensity-section">
        <span>Brillo</span>
        <input type="range" id="lightness" min="5" max="95" value="50">
    </div>

    <button id="clear-btn">Limpiar</button>
</div>

<div id="canvas-container">
    <div id="guide-h" class="guide"></div>
    <div id="guide-v" class="guide"></div>
    <canvas id="paintCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const swatches = document.querySelectorAll('.color-swatch');
    const lightSlider = document.getElementById('lightness');
    
    let drawing = false;
    let mode = 'draw'; // 'draw' o 'fill'
    let currentHue = 330, currentSat = 100, currentLight = 50;
    let points = [];

    // --- LÓGICA DE HERRAMIENTAS ---
    document.getElementById('btn-draw').onclick = () => setMode('draw');
    document.getElementById('btn-fill').onclick = () => setMode('fill');

    function setMode(newMode) {
        mode = newMode;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${newMode}`).classList.add('active');
    }

    // --- PALETA Y UI ---
    function updatePaletteUI() {
        swatches.forEach(s => {
            const h = s.dataset.h, sat = s.dataset.s !== undefined ? s.dataset.s : 100;
            s.style.backgroundColor = `hsl(${h}, ${sat}%, ${lightSlider.value}%)`;
        });
    }

    function resize() {
        const prevData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - document.getElementById('toolbar').offsetHeight;
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.putImageData(prevData, 0, 0);
    }

    window.addEventListener('resize', resize);
    lightSlider.oninput = () => { currentLight = lightSlider.value; updatePaletteUI(); };

    swatches.forEach(swatch => {
        swatch.onclick = () => {
            document.querySelector('.color-swatch.active').classList.remove('active');
            swatch.classList.add('active');
            currentHue = swatch.dataset.h;
            currentSat = swatch.dataset.s !== undefined ? swatch.dataset.s : 100;
        };
    });

    // --- ALGORITMO FLOOD FILL (RELLENO) ---
    function floodFill(startX, startY, fillColor) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const targetColor = getPixel(imageData, startX, startY);
        const fillRGB = hslToRgb(fillColor.h, fillColor.s, fillColor.l);

        if (colorsMatch(targetColor, fillRGB)) return;

        const pixelsToCheck = [[startX, startY]];
        while (pixelsToCheck.length > 0) {
            const [x, y] = pixelsToCheck.pop();
            const currentColor = getPixel(imageData, x, y);

            if (colorsMatch(currentColor, targetColor)) {
                setPixel(imageData, x, y, fillRGB);
                if (x > 0) pixelsToCheck.push([x - 1, y]);
                if (x < canvas.width - 1) pixelsToCheck.push([x + 1, y]);
                if (y > 0) pixelsToCheck.push([x, y - 1]);
                if (y < canvas.height - 1) pixelsToCheck.push([x, y + 1]);
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function getPixel(imageData, x, y) {
        const index = (y * imageData.width + x) * 4;
        return [imageData.data[index], imageData.data[index+1], imageData.data[index+2]];
    }

    function setPixel(imageData, x, y, color) {
        const index = (y * imageData.width + x) * 4;
        imageData.data[index] = color[0];
        imageData.data[index+1] = color[1];
        imageData.data[index+2] = color[2];
        imageData.data[index+3] = 255;
    }

    function colorsMatch(c1, c2) {
        return c1[0] === c2[0] && c1[1] === c2[1] && c1[2] === c2[2];
    }

    function hslToRgb(h, s, l) {
        l /= 100; s /= 100;
        const k = n => (n + h / 30) % 12;
        const a = s * Math.min(l, 1 - l);
        const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
        return [255 * f(0), 255 * f(8), 255 * f(4)].map(Math.round);
    }

    // --- LÓGICA DE DIBUJO ---
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: Math.round(clientX - rect.left), y: Math.round(clientY - rect.top) };
    }

    canvas.onmousedown = (e) => {
        const pos = getPos(e);
        if (mode === 'fill') {
            const w = canvas.width, h = canvas.height;
            const color = { h: currentHue, s: currentSat, l: currentLight };
            floodFill(pos.x, pos.y, color);
            floodFill(w - pos.x, pos.y, color);
            floodFill(pos.x, h - pos.y, color);
            floodFill(w - pos.x, h - pos.y, color);
        } else {
            drawing = true;
            points = [pos, pos, pos];
        }
    };

    window.onmousemove = (e) => {
        if (!drawing || mode !== 'draw') return;
        const pos = getPos(e);
        const lastPoint = points[points.length - 1];
        if (Math.hypot(pos.x - lastPoint.x, pos.y - lastPoint.y) > 2) {
            points.push(pos);
            const i = points.length - 2;
            const xc = (points[i].x + points[i + 1].x) / 2;
            const yc = (points[i].y + points[i + 1].y) / 2;
            
            ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = `hsl(${currentHue}, ${currentSat}%, ${currentLight}%)`;
            
            const w = canvas.width, h = canvas.height;
            drawSym(points[i-1].x, points[i-1].y, points[i].x, points[i].y, xc, yc, w, h);
            if (points.length > 20) points.shift();
        }
    };

    function drawSym(x0, y0, x1, y1, xc, yc, w, h) {
        const r = (ax, ay, bx, by, cx, cy) => {
            ctx.beginPath(); ctx.moveTo(ax, ay); ctx.quadraticCurveTo(bx, by, cx, cy); ctx.stroke();
        };
        r(x0, y0, x1, y1, xc, yc);
        r(w - x0, y0, w - x1, y1, w - xc, yc);
        r(x0, h - y0, x1, h - y1, xc, h - yc);
        r(w - x0, h - y0, w - x1, h - y1, w - xc, h - yc);
    }

    window.onmouseup = () => drawing = false;
    canvas.ontouchstart = (e) => { e.preventDefault(); canvas.onmousedown(e); };
    canvas.ontouchmove = (e) => { e.preventDefault(); window.onmousemove(e); };
    document.getElementById('clear-btn').onclick = () => { ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, canvas.width, canvas.height); };

    updatePaletteUI();
    resize();
</script>
</body>
</html>
