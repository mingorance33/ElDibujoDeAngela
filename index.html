<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Dibujo de Angela</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #161616;
            --accent-color: #ff79c6;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column;
            color: white;
        }

        #toolbar {
            height: auto;
            background: var(--panel-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            padding: 15px 25px;
            gap: 25px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.9);
            z-index: 10;
        }

        .brand h1 {
            color: var(--accent-color);
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(255, 121, 198, 0.3);
        }

        .color-section {
            display: flex;
            gap: 12px;
            background: #222;
            padding: 10px 18px;
            border-radius: 50px;
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, background-color 0.1s ease; /* Transición suave de color */
        }

        .color-swatch.active {
            border-color: white;
            transform: scale(1.25);
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .intensity-section {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #222;
            padding: 10px 20px;
            border-radius: 50px;
        }

        input[type=range] {
            cursor: pointer;
            width: 150px;
            accent-color: var(--accent-color);
        }

        #clear-btn {
            margin-left: auto;
            padding: 10px 25px;
            background: transparent;
            color: #ff5555;
            border: 2px solid #ff5555;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        #clear-btn:hover {
            background: #ff5555;
            color: white;
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: #000;
        }

        canvas { display: block; }

        .guide {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            pointer-events: none;
        }
        #guide-h { width: 100%; height: 1px; top: 50%; left: 0; }
        #guide-v { width: 1px; height: 100%; left: 50%; top: 0; }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="brand"><h1>El Dibujo de Angela</h1></div>

    <div class="color-section" id="palette">
        <div class="color-swatch active" data-h="330"></div>
        <div class="color-swatch" data-h="0"></div>
        <div class="color-swatch" data-h="30"></div>
        <div class="color-swatch" data-h="60"></div>
        <div class="color-swatch" data-h="120"></div>
        <div class="color-swatch" data-h="180"></div>
        <div class="color-swatch" data-h="220"></div>
        <div class="color-swatch" data-h="280"></div>
        <div class="color-swatch" data-h="0" data-s="0"></div>
    </div>

    <div class="intensity-section">
        <label>Luz / Sombra</label>
        <input type="range" id="lightness" min="5" max="95" value="50">
    </div>

    <button id="clear-btn">Borrar Lienzo</button>
</div>

<div id="canvas-container">
    <div id="guide-h" class="guide"></div>
    <div id="guide-v" class="guide"></div>
    <canvas id="paintCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    const swatches = document.querySelectorAll('.color-swatch');
    const lightSlider = document.getElementById('lightness');
    const clearBtn = document.getElementById('clear-btn');

    let drawing = false;
    let currentHue = 330;
    let currentSat = 100;
    let currentLight = 50;
    
    // Buffer para el suavizado extremo
    let points = []; 

    function updatePaletteUI() {
        swatches.forEach(s => {
            const h = s.dataset.h;
            const sat = s.dataset.s !== undefined ? s.dataset.s : 100;
            s.style.backgroundColor = `hsl(${h}, ${sat}%, ${lightSlider.value}%)`;
        });
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - document.getElementById('toolbar').offsetHeight;
        clearCanvas();
    }

    function clearCanvas() {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Inicialización
    window.addEventListener('resize', resize);
    lightSlider.addEventListener('input', () => {
        currentLight = lightSlider.value;
        updatePaletteUI();
    });

    swatches.forEach(swatch => {
        swatch.addEventListener('click', () => {
            document.querySelector('.color-swatch.active').classList.remove('active');
            swatch.classList.add('active');
            currentHue = swatch.dataset.h;
            currentSat = swatch.dataset.s !== undefined ? swatch.dataset.s : 100;
        });
    });

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDrawing(e) {
        drawing = true;
        points = [];
        const pos = getPos(e);
        // Añadimos el mismo punto varias veces para estabilizar el inicio
        for(let i=0; i<3; i++) points.push(pos);
    }

    function draw(e) {
        if (!drawing) return;
        const pos = getPos(e);
        
        // SUAVIZADO EXTRA: Solo registramos el punto si se ha movido lo suficiente
        // Esto evita el "ruido" de la mano
        const lastPoint = points[points.length - 1];
        const dist = Math.hypot(pos.x - lastPoint.x, pos.y - lastPoint.y);
        
        if (dist > 2) {
            points.push(pos);
            
            // Mantener solo los últimos puntos para el cálculo de la curva
            if (points.length > 3) {
                const i = points.length - 2;
                
                // Calculamos el punto medio entre los dos últimos para la curva de Bézier
                const xc = (points[i].x + points[i + 1].x) / 2;
                const yc = (points[i].y + points[i + 1].y) / 2;

                ctx.lineWidth = 5;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.strokeStyle = `hsl(${currentHue}, ${currentSat}%, ${currentLight}%)`;

                const w = canvas.width;
                const h = canvas.height;

                // Dibujar con simetría cuádruple
                drawSymmetric(points[i-1].x, points[i-1].y, points[i].x, points[i].y, xc, yc, w, h);
                
                // Si el buffer es muy grande, lo limpiamos un poco
                if (points.length > 20) points.shift();
            }
        }
    }

    function drawSymmetric(x0, y0, x1, y1, xc, yc, w, h) {
        // 1. Original
        render(x0, y0, x1, y1, xc, yc);
        // 2. Espejo Horizontal
        render(w - x0, y0, w - x1, y1, w - xc, yc);
        // 3. Espejo Vertical
        render(x0, h - y0, x1, h - y1, xc, h - yc);
        // 4. Espejo Total (Caleidoscopio)
        render(w - x0, h - y0, w - x1, h - y1, w - xc, h - yc);
    }

    function render(ax, ay, bx, by, cx, cy) {
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.quadraticCurveTo(bx, by, cx, cy);
        ctx.stroke();
    }

    function stopDrawing() { drawing = false; }

    // Eventos
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
    canvas.addEventListener('touchend', stopDrawing);
    clearBtn.addEventListener('click', clearCanvas);

    // Iniciar paleta
    updatePaletteUI();
    setTimeout(resize, 100);

</script>
</body>
</html>
