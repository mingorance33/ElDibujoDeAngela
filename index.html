<!DOCTYPE html>
<html lang="es">
<!-- 
************************************************************
*  PROYECTO: El Dibujo de Angela - Mandala Edition
*  VERSIÓN: 3.3 (Bezier Curves + Save JPG)
*  AUTOR: Angela
************************************************************
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Dibujo de Angela</title>
    <style>
        :root {
            --bg-color: #080808;
            --panel-color: #1a1a1a;
            --accent-color: #ff79c6;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column;
            color: white;
        }

        #toolbar {
            background: var(--panel-color);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            padding: 10px 20px;
            gap: 15px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.9);
            z-index: 10;
            border-bottom: 1px solid #333;
        }

        .brand h1 { color: var(--accent-color); font-size: 0.85rem; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .tools-group { display: flex; background: #2a2a2a; padding: 4px; border-radius: 10px; gap: 4px; }

        .tool-btn {
            padding: 6px 10px; border: none; background: transparent;
            color: white; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: 0.2s;
        }

        .tool-btn.active { background: var(--accent-color); }
        
        .sym-selector {
            display: flex; align-items: center; gap: 8px;
            background: #2a2a2a; padding: 4px 12px; border-radius: 10px;
        }
        select {
            background: transparent; color: white; border: 1px solid #444;
            border-radius: 4px; padding: 2px 5px; cursor: pointer; outline: none;
        }

        .color-section { display: flex; gap: 6px; background: #2a2a2a; padding: 6px 10px; border-radius: 50px; }
        .color-swatch { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
        .color-swatch.active { border-color: white; transform: scale(1.15); }

        .intensity-section { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; }
        input[type=range] { width: 70px; accent-color: var(--accent-color); }

        #save-btn { background: #50fa7b; color: #000; padding: 8px 15px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        #save-btn:hover { background: #40c060; transform: scale(1.05); }

        #clear-btn { margin-left: auto; padding: 8px 15px; background: #ff5555; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.75rem; }

        #canvas-container { flex-grow: 1; position: relative; background: #000; overflow: hidden; }
        canvas { display: block; touch-action: none; }
        
        #center-mark {
            position: absolute; width: 6px; height: 6px; background: var(--accent-color);
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; opacity: 0.5;
        }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="brand"><h1>Angela Studio</h1></div>

    <div class="tools-group">
        <button class="tool-btn active" id="btn-draw" title="Dibujar">✏️</button>
        <button class="tool-btn" id="btn-fill" title="Rellenar">🪣</button>
        <button class="tool-btn" id="undo-btn" title="Deshacer">↩️</button>
    </div>

    <div class="sym-selector">
        <span style="font-size: 0.7rem;">Simetría:</span>
        <select id="sym-count">
            <option value="4">4 Lados</option>
            <option value="6">6 Lados</option>
            <option value="8" selected>8 Lados</option>
            <option value="12">12 Lados</option>
            <option value="16">16 Lados</option>
        </select>
    </div>

    <div class="color-section" id="palette">
        <div class="color-swatch active" data-h="330"></div>
        <div class="color-swatch" data-h="0"></div>
        <div class="color-swatch" data-h="30"></div>
        <div class="color-swatch" data-h="60"></div>
        <div class="color-swatch" data-h="120"></div>
        <div class="color-swatch" data-h="180"></div>
        <div class="color-swatch" data-h="220"></div>
        <div class="color-swatch" data-h="280"></div>
        <div class="color-swatch" data-h="0" data-s="0"></div>
    </div>

    <div class="intensity-section">
        <span>Brillo</span>
        <input type="range" id="lightness" min="5" max="95" value="50">
    </div>

    <button id="save-btn">Guardar JPG</button>
    <button id="clear-btn">Limpiar</button>
</div>

<div id="canvas-container">
    <div id="center-mark"></div>
    <canvas id="paintCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const swatches = document.querySelectorAll('.color-swatch');
    const lightSlider = document.getElementById('lightness');
    const symSelect = document.getElementById('sym-count');
    
    let drawing = false;
    let mode = 'draw';
    let currentHue = 330, currentSat = 100, currentLight = 50;
    let points = [];
    let historyStack = [];

    function saveHistory() {
        if (historyStack.length >= 20) historyStack.shift();
        historyStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    }
    document.getElementById('undo-btn').onclick = () => { if (historyStack.length > 0) ctx.putImageData(historyStack.pop(), 0, 0); };

    function setMode(m) {
        mode = m;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${m}`).classList.add('active');
    }
    document.getElementById('btn-draw').onclick = () => setMode('draw');
    document.getElementById('btn-fill').onclick = () => setMode('fill');

    function updatePaletteUI() {
        swatches.forEach(s => {
            const h = s.dataset.h, sat = s.dataset.s !== undefined ? s.dataset.s : 100;
            s.style.backgroundColor = `hsl(${h}, ${sat}%, ${lightSlider.value}%)`;
        });
    }

    function resize() {
        const temp = ctx.getImageData(0, 0, canvas.width, canvas.height);
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - document.getElementById('toolbar').offsetHeight;
        ctx.fillStyle = '#080808';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.putImageData(temp, 0, 0);
    }

    window.onresize = resize;
    lightSlider.oninput = () => { currentLight = lightSlider.value; updatePaletteUI(); };
    swatches.forEach(sw => {
        sw.onclick = () => {
            document.querySelector('.color-swatch.active').classList.remove('active');
            sw.classList.add('active');
            currentHue = sw.dataset.h;
            currentSat = sw.dataset.s !== undefined ? sw.dataset.s : 100;
        };
    });

    function getPixel(img, x, y) {
        const i = (y * img.width + x) * 4;
        return [img.data[i], img.data[i+1], img.data[i+2]];
    }

    function floodFillRadial(startX, startY, fillHsl) {
        saveHistory();
        const slices = parseInt(symSelect.value);
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const dx = startX - centerX;
        const dy = startY - centerY;
        const radius = Math.sqrt(dx*dx + dy*dy);
        const startAngle = Math.atan2(dy, dx);

        for (let i = 0; i < slices; i++) {
            const angle = startAngle + (i * 2 * Math.PI / slices);
            const tx = Math.round(centerX + radius * Math.cos(angle));
            const ty = Math.round(centerY + radius * Math.sin(angle));
            if (tx >= 0 && tx < canvas.width && ty >= 0 && ty < canvas.height) {
                applyFloodFill(tx, ty, fillHsl);
            }
        }
    }

    function applyFloodFill(x, y, hsl) {
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const target = getPixel(img, x, y);
        const fill = hslToRgb(hsl.h, hsl.s, hsl.l);
        if (target[0] === fill[0] && target[1] === fill[1] && target[2] === fill[2]) return;

        const stack = [[x, y]];
        while (stack.length > 0) {
            const [cx, cy] = stack.pop();
            const idx = (cy * canvas.width + cx) * 4;
            if (img.data[idx] === target[0] && img.data[idx+1] === target[1] && img.data[idx+2] === target[2]) {
                img.data[idx] = fill[0]; img.data[idx+1] = fill[1]; img.data[idx+2] = fill[2]; img.data[idx+3] = 255;
                if (cx > 0) stack.push([cx - 1, cy]);
                if (cx < canvas.width - 1) stack.push([cx + 1, cy]);
                if (cy > 0) stack.push([cx, cy - 1]);
                if (cy < canvas.height - 1) stack.push([cx, cy + 1]);
            }
        }
        ctx.putImageData(img, 0, 0);
    }

    function hslToRgb(h, s, l) {
        l /= 100; s /= 100;
        const k = n => (n + h / 30) % 12;
        const a = s * Math.min(l, 1 - l);
        const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
        return [255 * f(0), 255 * f(8), 255 * f(4)].map(Math.round);
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: cx - rect.left, y: cy - rect.top };
    }

    canvas.onmousedown = (e) => {
        const pos = getPos(e);
        if (mode === 'fill') {
            floodFillRadial(pos.x, pos.y, {h: currentHue, s: currentSat, l: currentLight});
        } else {
            saveHistory();
            drawing = true;
            points = [pos];
        }
    };

    window.onmousemove = (e) => {
        if (!drawing || mode !== 'draw') return;
        const pos = getPos(e);
        const last = points[points.length-1];
        
        if (Math.hypot(pos.x - last.x, pos.y - last.y) > 2) {
            points.push(pos);

            if (points.length >= 4) {
                const p1 = points[points.length - 4];
                const p2 = points[points.length - 3];
                const p3 = points[points.length - 2];
                const p4 = points[points.length - 1];

                ctx.lineWidth = 1.5; 
                ctx.lineCap = 'round'; 
                ctx.lineJoin = 'round';
                ctx.strokeStyle = `hsl(${currentHue}, ${currentSat}%, ${currentLight}%)`;

                drawRadialBezier(p1, p2, p3, p4);
                
                if (points.length > 20) points.splice(0, 1);
            }
        }
    };

    function drawRadialBezier(p1, p2, p3, p4) {
        const slices = parseInt(symSelect.value);
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        for (let i = 0; i < slices; i++) {
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate((i * 2 * Math.PI) / slices);
            
            ctx.beginPath();
            ctx.moveTo(p1.x - centerX, p1.y - centerY);
            ctx.bezierCurveTo(
                p2.x - centerX, p2.y - centerY, 
                p3.x - centerX, p3.y - centerY, 
                p4.x - centerX, p4.y - centerY
            );
            ctx.stroke();
            
            ctx.scale(1, -1);
            ctx.beginPath();
            ctx.moveTo(p1.x - centerX, p1.y - centerY);
            ctx.bezierCurveTo(
                p2.x - centerX, p2.y - centerY, 
                p3.x - centerX, p3.y - centerY, 
                p4.x - centerX, p4.y - centerY
            );
            ctx.stroke();
            
            ctx.restore();
        }
    }

    // --- FUNCIÓN PARA GUARDAR JPG ---
    document.getElementById('save-btn').onclick = () => {
        // Crear un canvas temporal para el JPG (necesita fondo sólido)
        const saveCanvas = document.createElement('canvas');
        saveCanvas.width = canvas.width;
        saveCanvas.height = canvas.height;
        const sCtx = saveCanvas.getContext('2d');

        // Pintar fondo negro
        sCtx.fillStyle = "#080808";
        sCtx.fillRect(0, 0, saveCanvas.width, saveCanvas.height);

        // Copiar el contenido del dibujo
        sCtx.drawImage(canvas, 0, 0);

        // Crear enlace de descarga
        const link = document.createElement('a');
        link.download = 'angela-mandala.jpg';
        link.href = saveCanvas.toDataURL('image/jpeg', 0.9);
        link.click();
    };

    window.onmouseup = () => drawing = false;
    canvas.ontouchstart = (e) => { e.preventDefault(); canvas.onmousedown(e); };
    canvas.ontouchmove = (e) => { e.preventDefault(); window.onmousemove(e); };
    document.getElementById('clear-btn').onclick = () => { saveHistory(); ctx.fillStyle='#080808'; ctx.fillRect(0,0,canvas.width,canvas.height); };

    updatePaletteUI();
    resize();
</script>
</body>
</html>
